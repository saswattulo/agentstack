name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras

      - name: ruff
        run: uv run ruff check src tests

      - name: ruff format check
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src
        continue-on-error: true

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras

      - name: Run unit tests
        env:
          APP_ENV: test
          GROQ_API_KEY: test-groq-key
          DEV_API_KEY: test-dev-key
        run: uv run pytest -m unit --cov=src/agentstack --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentstack
          POSTGRES_PASSWORD: agentstack
          POSTGRES_DB: agentstack
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agentstack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-extras

      - name: Apply migrations
        env:
          POSTGRES_HOST: localhost
        run: uv run alembic upgrade head

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost
          QDRANT_HOST: localhost
          GROQ_API_KEY: test-groq-key
          DEV_API_KEY: test-dev-key
        run: uv run pytest -m integration

  docker-build:
    name: docker build + push (ghcr)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - { name: api,    dockerfile: docker/api.Dockerfile }
          - { name: worker, dockerfile: docker/worker.Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
