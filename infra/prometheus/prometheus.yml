global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: agentstack

scrape_configs:
  - job_name: agentstack-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
