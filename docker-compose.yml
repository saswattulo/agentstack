name: agentstack

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentstack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentstack}
      POSTGRES_DB: ${POSTGRES_DB:-agentstack}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentstack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentstack-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: agentstack-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  phoenix:
    image: arizephoenix/phoenix:version-7.9.0
    container_name: agentstack-phoenix
    ports:
      - "6006:6006"   # UI + OTel HTTP receiver
      - "4317:4317"   # OTel gRPC receiver
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    volumes:
      - phoenix_data:/phoenix

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: agentstack-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: agentstack-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: agentstack-api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
    ports:
      - "8000:8000"
    volumes:
      - uploads:/tmp/agentstack/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["uvicorn", "agentstack.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: agentstack-worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
    volumes:
      - models_cache:/models_cache
      - uploads:/tmp/agentstack/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command:
      ["celery", "-A", "agentstack.workers.celery_app", "worker",
       "--loglevel=info", "--concurrency=2",
       "-Q", "default,ingest,eval"]

volumes:
  pg_data:
  redis_data:
  qdrant_storage:
  phoenix_data:
  prometheus_data:
  grafana_data:
  models_cache:
  uploads: