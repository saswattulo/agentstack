name: agentstack

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    volumes:
      - ./src:/app/src
    command: ["uvicorn", "agentstack.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    volumes:
      - ./src:/app/src
    command:
      ["watchmedo", "auto-restart", "--directory=/app/src", "--pattern=*.py", "--recursive", "--",
       "celery", "-A", "agentstack.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
